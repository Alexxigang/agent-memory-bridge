name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install -e .

      - name: Run unit tests
        env:
          PYTHONPATH: src
        run: python -m unittest discover -s tests -v

      - name: Verify CLI commands
        env:
          PYTHONPATH: src
        run: |
          python -m memory_migrate_plugin.cli adapters
          python -m memory_migrate_plugin.cli profiles

      - name: Smoke test bundle and verify
        shell: bash
        env:
          PYTHONPATH: src
        run: |
          mkdir -p ci-fixtures
          cat > ci-fixtures/entries.json <<'JSON'
          [
            {
              "id": "same-id",
              "kind": "",
              "title": "",
              "content": "Has content"
            },
            {
              "id": "same-id",
              "kind": "note",
              "title": "Rule B",
              "content": "two"
            }
          ]
          JSON
          python -m memory_migrate_plugin.cli bundle \
            --input ci-fixtures/entries.json \
            --to agents-md \
            --profile agent-rules \
            --output-dir ci-bundle \
            --zip ci-bundle.zip
          python -m memory_migrate_plugin.cli verify --manifest ci-bundle/manifest.json
