name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build distributions
        run: python -m build

      - name: Create source release bundle
        shell: bash
        run: |
          mkdir -p release-fixtures
          cat > release-fixtures/entries.json <<'JSON'
          [
            {
              "id": "release-demo",
              "kind": "project",
              "title": "Release Demo",
              "content": "Release workflow demo bundle."
            }
          ]
          JSON
          python -m pip install -e .
          PYTHONPATH=src python -m memory_migrate_plugin.cli release \
            --input release-fixtures/entries.json \
            --to agents-md \
            --profile agent-rules \
            --output-dir dist/release-demo \
            --zip dist/release-demo.zip

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*
            dist/release-demo/**
